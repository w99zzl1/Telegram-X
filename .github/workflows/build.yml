name: Build TGX Debug

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
      CI: "true"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            git-lfs unzip zip openjdk-21-jdk python3 \
            build-essential pkg-config cmake ninja-build \
            nasm yasm clang lld \
            zlib1g-dev libssl-dev libstdc++6 libtinfo6
          git lfs install

      - name: Configure
        continue-on-error: true
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          set +e
          sudo mkdir -p /tests /doc/examples /doc /fftools && sudo touch /tests/Makefile /doc/examples/Makefile /doc/Makefile /fftools/Makefile
          printf "org.thunderdog.challegram\nhttps://github.com/TGX-Android/Telegram-X/releases\nhttps://github.com/TGX-Android/Telegram-X\n/home/runner/.tgx_keystore.properties\n" | TERM=xterm ./scripts/setup.sh 2>&1 | tee /home/runner/setup.log
          echo "${PIPESTATUS[1]}" > /home/runner/setup.rc

          mkdir -p /home/runner/.android
          cat > /home/runner/.tgx_keystore.properties <<'EOF'
          keystore.file=/home/runner/.android/debug.keystore
          keystore.password=android
          key.alias=androiddebugkey
          key.password=android
          EOF
          keytool -genkey -v -keystore /home/runner/.android/debug.keystore -storepass android -keypass android -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true

          cat > local.properties <<EOF
          sdk.dir=/usr/local/lib/android/sdk
          telegram.api_id=${TELEGRAM_API_ID}
          telegram.api_hash=${TELEGRAM_API_HASH}
          EOF

          if [ -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
            $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;23.2.8568313" "cmake;3.22.1"
          fi

      - name: Show setup log (always)
        if: always()
        run: |
          echo "==== SETUP LOG TAIL ===="
          tail -n 200 /home/runner/setup.log || true
          echo "==== ERROR LINES ===="
          grep -i -E "error:|failed|cannot|no such file|not found" /home/runner/setup.log | tail -n 50 || true
          echo "==== SETUP RC ===="
          cat /home/runner/setup.rc || true

      - name: Upload setup log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setup-log
          path: /home/runner/setup.log

      - name: Fail if configure failed
        if: always()
        run: |
          test "$(cat /home/runner/setup.rc)" = "0"

      - name: Fix tgcalls symlinks
        if: success()
        run: |
          find app/.cxx -type d -name tgvoip -print0 | while IFS= read -r -d '' d; do
            ln -sfn tgvoip "${d%/tgvoip}/tgcalls"
          done

      - name: Gradle limits
        if: success()
        run: |
          mkdir -p ~/.gradle
          printf "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8\norg.gradle.parallel=false\norg.gradle.workers.max=2\n" > ~/.gradle/gradle.properties

      - name: Build
        if: success()
        run: |
          set +e
          ./gradlew assembleLatestUniversalDebug --no-daemon --console=plain
          RC=$?
          if [ $RC -ne 0 ]; then
            echo "Retry after creating tgcalls symlinks"
            find app/.cxx -type d -name tgvoip -print0 | while IFS= read -r -d '' d; do
              ln -sfn tgvoip "${d%/tgvoip}/tgcalls"
            done
            ./gradlew assembleLatestUniversalDebug --no-daemon --console=plain
            RC=$?
          fi
          exit $RC


      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tgx-latest-debug-apk
          path: app/build/outputs/apk/**/latest*debug*.apk
